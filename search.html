<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RooMatch - Search</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="search-page-body">

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="images/logo2.png" alt="RooMatch Logo">
        </div>

        <nav>
            <a href="profile.html">Profile</a>
            <a href="search.html" class="active">Search</a>
            <button id="logoutBtn">Logout</button>
        </nav>
    </header>

    <main class="search-main">

        <!-- Search filters -->
        <aside class="search-sidebar">
            <h2>Filters</h2>

            <div class="filter-group">
                <label for="filterAgeMin">Age Range:</label>

                <div class="age-inputs">
                    <input
                        type="number"
                        id="filterAgeMin"
                        placeholder="Min"
                        min="18"
                    >

                    <span>-</span>

                    <input
                        type="number"
                        id="filterAgeMax"
                        placeholder="Max"
                        max="100"
                    >
                </div>
            </div>

            <div class="filter-group">
                <label for="filterGender">Gender:</label>

                <select id="filterGender">
                    <option value="any">Any</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterSmoking">Smoking:</label>

                <select id="filterSmoking">
                    <option value="any">Any</option>
                    <option value="non-smoker">Non-Smoker</option>
                    <option value="smoker">Smoker</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterPets">Pets:</label>

            <select id="filterPets">
                <option value="any">Any</option>
                <option value="has_pets">Have pets</option>
                <option value="no_pets_but_ok">No pets, but ok with pets</option>
                <option value="no_pets_not_ok">No pets, not ok with pets</option>
            </select>
            </div>

            <button id="applyFiltersBtn" class="btn-primary" style="width: 100%;">
                Apply Filters
            </button>
        </aside>

        <!-- Search results -->
        <section class="search-results-area">
            <div class="results-header">
                <h2>Potential Matches</h2>

                <div id="noResultsMsg" class="no-results-box" style="display: none;">
                    <div class="no-results-icon">🔍</div>
                    <h3>No Matches Found</h3>
                    <p>No roommates match your current filters. Try changing one or more filters and search again.</p>
                </div>
            </div>
        <div class="results-grid" id="resultsGrid">
          <!-- Profiles from database will be loaded here -->
        </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 RooMatch. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
