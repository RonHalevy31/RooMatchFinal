<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RooMatch - Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <main class="login-main">

        <!-- Left side -->
        <section class="login-left">

            <div class="circle circle-one"></div>
            <div class="circle circle-two"></div>

            <img
                src="images/logo.jpg"
                alt="RooMatch Logo"
                class="login-logo-img"
            >

            <h1>Find your match. Feel at home.</h1>

            <p>
                Find a roommate that fits your lifestyle,
                habits and preferences.
            </p>

        </section>

        <!-- Right side -->
        <section class="login-right">

            <div class="login-box">

                <h2>Login</h2>

                <!-- Login form -->
                <form id="loginForm" action="http://localhost:3000/login" method="POST">

                    <div class="form-group">
                        <label for="email">Email Address</label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-primary">
                        Login
                    </button>

                </form>

                <p class="login-link">
                    <a href="#" id="forgotPasswordLink">
                        Forgot Password?
                    </a>
                </p>

                <hr>

                <p>Don't have an account?</p>

                <a href="signup.html" class="create-account-link">
                    Create New Account
                </a>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
